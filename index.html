<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="./style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Chat</title>
  </head>

  <body>
    <div id="app">
      <aside id="sidebar">
        <button id="new-session">New Session</button>

        <div id="sessions-title">Sessions</div>
        <div id="sessions"></div>
      </aside>

      <main id="main">
        <div id="chat"></div>

        <div id="usage" aria-live="polite"></div>

        <form id="input">
          <input id="message" autocomplete="off" placeholder="Say something..." />
          <button id="send-message" class="icon-button" type="submit" aria-label="Send message" title="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3 20V4l18 8-18 8Zm2-3 10.85-5L5 7v3.6l6 1.4-6 1.4V17Z" />
            </svg>
          </button>
          <button id="abort-message" class="icon-button abort-button" type="button" aria-label="Abort response" title="Abort response" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7 7h10v10H7z" />
            </svg>
          </button>
        </form>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.3/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.4/dist/purify.min.js"></script>

    <script src="./store.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
